apiVersion: batch/v1
kind: Job
metadata:
  name: populate-data
  namespace: affiliate-junction
  labels:
    app.kubernetes.io/name: affiliate-junction
    app.kubernetes.io/component: populate-data
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: affiliate-junction
        app.kubernetes.io/component: populate-data
    spec:
      serviceAccountName: affiliate-junction-sa
      restartPolicy: OnFailure
      containers:
        - name: populate-data
          image: affiliate-junction:latest
          imagePullPolicy: Always
          command: ["python", "generate_traffic.py"]
          env:
            - name: CONFIG_PATH
              value: /config/config.yaml
            - name: HCD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: affiliate-junction-secrets
                  key: HCD_USERNAME
            - name: HCD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: affiliate-junction-secrets
                  key: HCD_PASSWORD
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: affiliate-junction-config


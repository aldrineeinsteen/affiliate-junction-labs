apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui
  namespace: affiliate-junction
  labels:
    app.kubernetes.io/name: affiliate-junction
    app.kubernetes.io/component: web-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: affiliate-junction
      app.kubernetes.io/component: web-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: affiliate-junction
        app.kubernetes.io/component: web-ui
    spec:
      serviceAccountName: affiliate-junction-sa
      containers:
        - name: web-ui
          image: affiliate-junction:latest
          imagePullPolicy: Always
          command: ["python", "-m", "uvicorn"]
          args:
            - "web.main:app"
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "10000"
          ports:
            - name: http
              containerPort: 10000
              protocol: TCP
          env:
            - name: CONFIG_PATH
              value: /config/config.yaml
            - name: HCD_USERNAME
              valueFrom:
                secretKeyRef:
                  name: affiliate-junction-secrets
                  key: HCD_USERNAME
            - name: HCD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: affiliate-junction-secrets
                  key: HCD_PASSWORD
            - name: PRESTO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: affiliate-junction-secrets
                  key: PRESTO_USERNAME
            - name: PRESTO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: affiliate-junction-secrets
                  key: PRESTO_PASSWORD
            - name: WEB_AUTH_PASSWD
              valueFrom:
                secretKeyRef:
                  name: affiliate-junction-secrets
                  key: WEB_AUTH_PASSWD
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 10000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 10000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: affiliate-junction-config

